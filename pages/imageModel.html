<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Dark</title>
    <link rel="stylesheet" href="../style/style.css">
    <link rel="stylesheet" href="../style/imageModelStyle.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

</head>

<body>

    <aside class="sidebar">

        <div class="logo">
            DASH
        </div>

        <div class="menu">
            <a href="../index.html">Inicio</a>
            <a href="../pages/audioModel.html">Usuarios</a>
            <a href="../pages/imageModel.html">Productos</a>
            <a href="./colabImage.html">Productos</a>
        </div>

    </aside>




<main class="main">

    <div class="bg-blur bg1"></div>
    <div class="bg-blur bg2"></div>

    <div class="classifier-card">

        <div class="header-section">

            <h1>Clasificador Inteligente</h1>

            <p class="subtitle">
                Detección automática de residuos mediante Inteligencia Artificial
            </p>

        </div>

        <div class="upload-section">

            <label
                for="fileInput"
                class="custom-file-btn">

                Seleccionar Imagen

            </label>

            <input
                type="file"
                id="fileInput"
                accept="image/*" hidden>

        </div>

        <div class="preview-camera-grid">

            <div class="card-box">

                <h3>Imagen</h3>

                <img
                    id="preview"
                    src="https://placehold.co/400x250/0f172a/94a3b8?text=Vista+Previa">

            </div>

            <div class="card-box">

                <h3>Cámara IA</h3>

                <div class="camera-wrapper">

                    <video
                        id="webcam"
                        autoplay
                        playsinline>
                    </video>

                    <div class="scanner-line"></div>

                </div>

            </div>

        </div>

        <div class="camera-buttons">

            <button id="btnCamara">
                📷 Encender Cámara
            </button>

            <button id="btnApagarCamara">
                ⛔ Apagar Cámara
            </button>

        </div>

        <div class="status">

            <span class="dot"></span>

            IA lista para analizar

        </div>

        <div
            id="resultado"
            class="resultado-card">

            Esperando clasificación...

        </div>

        <div class="confidence-container">

            <div id="confidenceBar"></div>

        </div>

        <div class="history">

            <h3>Historial reciente</h3>

            <ul id="historyList"></ul>

        </div>

    </div>

</main>


        

    <script src="./script/script.js">

    </script>
<script src="../script/imagescript.js"></script>
</body>

</html>
